<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>Touch Down Card Game</title>

    <!-- PWA -->
    <link rel="manifest" href="/public/manifest.json">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="할리갈리">
    <link rel="apple-touch-icon" href="/public/icons/icon.svg">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/ionicons/2.0.1/css/ionicons.min.css">
    <link rel="stylesheet" href="/public/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- CSS 로딩 실패 시 기본 스타일 -->
    <style>
        .game-body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
        }
        .game-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 0.75rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 1rem;
        }
        .player-card {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 0.75rem;
            padding: 1rem;
            margin-bottom: 0.5rem;
        }
        .btn {
            border-radius: 0.5rem;
            padding: 0.5rem 1rem;
        }
    </style>
</head>

<body class="game-body">

    <!-- ===== 로딩 화면 ===== -->
    <div id="loadingScreen" class="loading-screen">
        <div class="loading-content">
            <div class="loading-bell">🔔</div>
            <h2 class="loading-title">Touch Down</h2>
            <p class="loading-subtitle">Card Game</p>
            <div class="loading-dots">
                <span></span><span></span><span></span>
            </div>
            <p class="loading-status" id="loadingStatus">서버에 연결하는 중...</p>
        </div>
    </div>

    <!-- ===== 게임 시작 카운트다운 오버레이 ===== -->
    <div id="countdownOverlay" class="countdown-overlay" style="display:none">
        <div class="countdown-content">
            <p class="countdown-label">게임 시작까지</p>
            <div class="countdown-number" id="countdownNumber">3</div>
            <p class="countdown-sub" id="countdownSub">모든 플레이어가 준비되었습니다!</p>
        </div>
    </div>

    <nav class="navbar navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#">
                <i class="icon ion-android-gamepad me-2"></i>
                Touch Down Card Game
            </a>
            <div class="d-flex align-items-center gap-2">
                <span class="badge bg-success me-2" id="connectStatus">연결 중...</span>
                <span class="text-light" id="nick">User</span>
                <!-- 로그인 상태 영역 (JS에서 동적으로 채움) -->
                <div id="authArea" class="d-flex align-items-center gap-2"></div>
            </div>
        </div>
    </nav>
    <main class="main-content">
        <div class="container-fluid" id="lobby">
            <div class="row justify-content-center">
                <div class="col-12 col-lg-8 col-xl-6">
                    <!-- 로그인 배너 (비로그인 시 표시) -->
                    <div id="loginBanner" class="card game-card mb-3 login-banner" style="display:none">
                        <div class="card-body py-3">
                            <div class="login-banner-inner">
                                <div class="login-banner-text">
                                    <div class="login-banner-icon">🏆</div>
                                    <div>
                                        <h6 class="mb-1 fw-bold">로그인하면 랭킹에 기록돼요!</h6>
                                        <p class="text-muted mb-0" style="font-size:0.8rem">업적 · 미션 · 랭킹을 이용해보세요</p>
                                    </div>
                                </div>
                                <div id="loginBannerButtons" class="login-banner-buttons"></div>
                            </div>
                        </div>
                    </div>

                    <!-- 닉네임 설정 카드 -->
                    <div class="card game-card mb-4">
                        <div class="card-body">
                            <div class="d-flex align-items-center mb-3">
                                <i class="icon ion-person me-2 text-primary"></i>
                                <h5 class="card-title mb-0">닉네임 설정</h5>
                            </div>
                            <form id="nickForm" class="d-flex gap-2">
                                <input class="form-control" type="text" id="nickname" placeholder="닉네임을 입력하세요" style="font-size:16px">
                                <button class="btn btn-primary" type="submit">
                                    <i class="icon ion-checkmark"></i>
                                </button>
                            </form>
                        </div>
                    </div>

                    <!-- 리텐션 탭 (랭킹 · 업적 · 미션) -->
                    <div class="card game-card mb-4" id="retentionCard">
                        <div class="card-body p-2">
                            <ul class="nav nav-tabs nav-fill" id="retentionTabs" role="tablist">
                                <li class="nav-item" role="presentation">
                                    <button class="nav-link active" id="tab-ranking" data-bs-toggle="tab"
                                        data-bs-target="#panel-ranking" type="button">🏆 랭킹</button>
                                </li>
                                <li class="nav-item" role="presentation">
                                    <button class="nav-link" id="tab-achievements" data-bs-toggle="tab"
                                        data-bs-target="#panel-achievements" type="button">🎖️ 업적</button>
                                </li>
                                <li class="nav-item" role="presentation">
                                    <button class="nav-link" id="tab-missions" data-bs-toggle="tab"
                                        data-bs-target="#panel-missions" type="button">📋 오늘의 미션</button>
                                </li>
                                <li class="nav-item" role="presentation">
                                    <button class="nav-link" id="tab-cosmetics" data-bs-toggle="tab"
                                        data-bs-target="#panel-cosmetics" type="button">🎨 꾸미기</button>
                                </li>
                            </ul>
                            <div class="tab-content pt-3 px-1" id="retentionContent">
                                <!-- 랭킹 패널 -->
                                <div class="tab-pane fade show active" id="panel-ranking" role="tabpanel">
                                    <div class="d-flex gap-2 mb-2">
                                        <select class="form-select form-select-sm w-auto" id="rankPeriod">
                                            <option value="alltime">전체</option>
                                            <option value="weekly">이번 주</option>
                                            <option value="monthly">이번 달</option>
                                        </select>
                                        <select class="form-select form-select-sm w-auto" id="rankType">
                                            <option value="score">점수</option>
                                            <option value="wins">승리수</option>
                                        </select>
                                    </div>
                                    <div id="rankingList" class="small">로딩 중...</div>
                                    <div id="myRankBadge" class="mt-2 text-center small text-muted"></div>
                                </div>
                                <!-- 업적 패널 -->
                                <div class="tab-pane fade" id="panel-achievements" role="tabpanel">
                                    <div id="achievementList" class="small">로그인 후 확인 가능합니다.</div>
                                </div>
                                <!-- 미션 패널 -->
                                <div class="tab-pane fade" id="panel-missions" role="tabpanel">
                                    <div id="missionList" class="small">로딩 중...</div>
                                </div>
                                <!-- 코스메틱 패널 -->
                                <div class="tab-pane fade" id="panel-cosmetics" role="tabpanel">
                                    <div class="cosmetics-panel text-center py-3 text-muted small">로딩 중...</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 광고 배너 (ADSENSE_PUBLISHER_ID 설정 시 표시) -->
                    <div id="adLobbyBanner" class="ad-banner-container" style="display:none"></div>

                    <!-- 방 관리 카드 -->
                    <div class="card game-card">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <div class="d-flex align-items-center">
                                    <i class="icon ion-ios-people me-2 text-primary"></i>
                                    <h5 class="card-title mb-0">게임 방</h5>
                                </div>
                                <div class="d-flex gap-2">
                                    <button class="btn btn-outline-primary btn-sm" type="button" id="refreshRoom">
                                        <i class="icon ion-refresh"></i>
                                    </button>
                                    <button class="btn btn-primary btn-sm" type="button" data-bs-target="#modal_createRoom" data-bs-toggle="modal">
                                        <i class="icon ion-plus"></i> 방 만들기
                                    </button>
                                </div>
                            </div>
                            
                            <!-- 방 목록 -->
                            <div class="room-list">
                                <div id="rooms" class="list-group list-group-flush">
                                    <!-- 방 목록이 여기에 동적으로 추가됩니다 -->
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!-- 게임룸 섹션 -->
        <div class="container-fluid" id="gameroom" style="display: none;">
            <div class="row justify-content-center">
                <div class="col-12 col-lg-10 col-xl-8">
                    <div class="card game-card">
                        <div class="card-body">
                            <input type="hidden" id="roomId" value="">
                            
                            <!-- 방 헤더 -->
                            <div class="room-header mb-3">
                                <div class="room-header-top">
                                    <div class="room-header-info">
                                        <h4 class="room-title" id="roomname">Room Name</h4>
                                        <span class="room-count-badge" id="headCount">0/4</span>
                                    </div>
                                    <div class="d-flex gap-2">
                                        <button class="btn btn-outline-danger btn-sm" id="leaveRoom" type="button" onClick="leaveRoom();">
                                            <i class="icon ion-log-out"></i> 나가기
                                        </button>
                                        <button class="btn btn-success btn-sm" type="button" id="readyButton">
                                            <i class="icon ion-checkmark"></i> Ready
                                        </button>
                                    </div>
                                </div>

                                <!-- 대기 상태 표시 -->
                                <div class="waiting-status-bar" id="waitingStatusBar">
                                    <div class="waiting-status-left">
                                        <span class="waiting-dot" id="waitingDot"></span>
                                        <span class="waiting-status-text" id="waitingStatusText">플레이어 대기 중...</span>
                                    </div>
                                    <span class="ready-count-badge" id="readyCountBadge">0 / 0 준비</span>
                                </div>
                                <div class="ready-progress-bar">
                                    <div class="ready-progress-fill" id="readyProgressFill" style="width:0%"></div>
                                </div>
                            </div>

                            <!-- 플레이어 목록 -->
                            <div class="player-section mb-4">
                                <div id="userList" class="player-grid">
                                    <!-- 플레이어 목록이 여기에 동적으로 추가됩니다 -->
                                </div>
                            </div>

                            <!-- 게임 보드 -->
                            <div class="game-board">
                                <!-- 중앙 플레이어별 카드 더미 영역 -->
                                <div class="center-play-area" id="centerPlayArea">
                                    <h6 class="text-white text-center mb-3">플레이어별 카드 더미</h6>
                                    <div class="player-stacks" id="playerStacks">
                                        <!-- 각 플레이어의 카드 더미가 여기에 표시됩니다 -->
                                    </div>
                                    
                                    <!-- 할리갈리 벨 버튼 -->
                                    <div class="halli-galli-bell-container">
                                        <button type="button" class="halli-galli-bell" id="halliGalliBell">
                                            <div class="bell-icon">🔔</div>
                                            <div class="bell-text">TOUCH!</div>
                                        </button>
                                    </div>
                                    
                                    <!-- 버림 카드 더미 (공용) -->
                                    <div class="discard-pile-container">
                                        <h6 class="text-white text-center mb-2">버림 카드</h6>
                                        <div id="discardPile" class="discard-pile">
                                            <div class="discard-placeholder">버림 카드 없음</div>
                                        </div>
                                        <div id="discardCount" class="discard-count">0장</div>
                                    </div>
                                </div>

                                <!-- 내 카드 덱 (하단) -->
                                <div class="my-deck-area" id="myDeckArea">
                                    <div class="my-deck-container">
                                        <h6 class="text-white mb-2">내 덱</h6>
                                        <div id="myDeckCard" class="my-deck-card-slot">
                                            <!-- 내 카드가 여기에 표시됩니다 -->
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!-- 방 만들기 모달 -->
        <div class="modal fade" id="modal_createRoom" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">
                            <i class="icon ion-plus me-2"></i>
                            새 방 만들기
                        </h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <form id="modalCreateForm">
                        <div class="modal-body">
                            <div class="mb-3">
                                <label class="form-label" for="modalRoomName">방 이름</label>
                                <input id="modalRoomName" class="form-control" type="text" placeholder="방 이름을 입력하세요" required autocomplete="off">
                            </div>
                            <div class="mb-3">
                                <label class="form-label" for="modalMaxUsers">최대 인원</label>
                                <select id="modalMaxUsers" class="form-select">
                                    <option value="2">2명</option>
                                    <option value="3">3명</option>
                                    <option value="4" selected>4명</option>
                                    <option value="6">6명</option>
                                    <option value="8">8명</option>
                                </select>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
                            <button type="submit" class="btn btn-primary">
                                <i class="icon ion-checkmark me-1"></i>
                                방 만들기
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- 게임 종료 모달 -->
        <div class="modal fade" id="gameEndModal" tabindex="-1" aria-labelledby="gameEndModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content game-end-modal">
                    <div class="modal-body text-center p-5">
                        <div id="gameEndContent">
                            <!-- 승리/패배 내용이 동적으로 추가됩니다 -->
                        </div>
                        <div class="game-end-scores mt-4">
                            <h5 class="mb-3">최종 점수</h5>
                            <div id="finalScoresList">
                                <!-- 점수 리스트가 여기에 표시됩니다 -->
                            </div>
                        </div>
                        <!-- 게임 종료 광고 (ADSENSE_PUBLISHER_ID 설정 시 표시) -->
                        <div id="adGameEnd" class="ad-game-end" style="display:none"></div>
                        <div class="mt-4">
                            <button type="button" class="btn btn-primary btn-lg" onclick="closeGameEndModal()">확인</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/env.js"></script>
    <script src="/public/js/config.js"></script>
    <script src="/public/js/auth.js"></script>
    <script src="/public/js/retention.js"></script>
    <script src="/public/js/touch.js"></script>
    <script src="/public/js/cosmetics.js"></script>
    <script src="/public/js/shop.js"></script>
    <script src="/public/js/app.js"></script>

    <!-- Service Worker 등록 -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/public/sw.js', { scope: '/' })
          .then(() => console.log('[PWA] Service Worker 등록 완료'))
          .catch((err) => console.warn('[PWA] Service Worker 등록 실패:', err));
      }
    </script>
</body>

</html>
